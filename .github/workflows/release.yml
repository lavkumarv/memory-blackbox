name: Release

on:
  push:
    tags: ["v*"]

# No global grant: each job requests only the scopes it needs (least privilege).
permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # upload release assets
      id-token: write  # keyless Sigstore signing
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build sdist and wheel
        run: uv build

      - name: Generate SBOM (CycloneDX)
        run: |
          uv sync --frozen
          uvx --from cyclonedx-bom cyclonedx-py environment .venv \
            --output-format json --outfile dist/agent-forensics.sbom.cdx.json

      - name: Generate subject hashes (for SLSA provenance)
        id: hash
        run: |
          cd dist
          echo "hashes=$(sha256sum * | base64 -w0)" >> "$GITHUB_OUTPUT"

      - name: Sign artifacts with Sigstore (keyless)
        uses: sigstore/gh-action-sigstore-python@v3.4.0
        with:
          inputs: ./dist/*.tar.gz ./dist/*.whl

      - name: Upload artifacts to the release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
            dist/*.sigstore*

  provenance:
    needs: build
    permissions:
      actions: read
      id-token: write
      contents: write
    # SLSA Level 3 build provenance for the published artifacts.
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.0.0
    with:
      base64-subjects: ${{ needs.build.outputs.hashes }}
      upload-assets: true

  publish:
    needs: [build, provenance]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # PyPI trusted publishing (OIDC), no API token stored
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - run: uv build
      - name: Publish to PyPI
        run: uv publish
